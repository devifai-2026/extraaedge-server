# Keeps the free-tier Render services awake.
#
# Render's free instances sleep after ~15 min idle; the next request then eats a
# ~50s cold start. For the WhatsApp gateway that also means the live WhatsApp
# link drops. This cron pings both services' /healthz every ~10 minutes so they
# never idle into sleep.
#
# Note: GitHub's scheduled runs can be delayed by several minutes under load and
# are paused after ~60 days of repo inactivity — fine for keeping a service warm,
# but not a hard real-time guarantee. If you need stricter uptime, use a paid
# Render instance or an external uptime pinger (e.g. cron-job.org / UptimeRobot).
name: keep-alive

on:
  schedule:
    - cron: '*/10 * * * *' # every 10 minutes
  workflow_dispatch: {}      # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API
        run: curl -fsS -m 60 https://extraaedge-server.onrender.com/healthz || true
      - name: Ping WhatsApp gateway
        run: curl -fsS -m 60 https://extraaedge-wa-gateway.onrender.com/healthz || true
