# Nginx — wildcard subdomain routing for *.productivo.in + SSE-friendly buffering.
# Put at /etc/nginx/sites-available/extraaedge.conf and symlink into sites-enabled.

server {
  listen 80;
  server_name *.productivo.in;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name *.productivo.in;

  # Wildcard cert (Let's Encrypt DNS-01 via certbot-dns-cloudflare, for example)
  ssl_certificate     /etc/letsencrypt/live/productivo.in/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/productivo.in/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;

  client_max_body_size 50M;
  proxy_read_timeout   300s;
  proxy_send_timeout   300s;

  # SSE needs streaming, no buffering
  location /api/v1/notifications/stream {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding on;
  }

  location / {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
