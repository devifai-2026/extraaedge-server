# Render Blueprint — a single service that runs the CRM backend:
#
#   extraaedge-api   the Express API + socket.io (Node runtime, no browser)
#
# WhatsApp is handled by WABridge (outbound) + a Meta Cloud API webhook
# (inbound) — plain HTTP, no separate gateway process or browser. Set WABRIDGE_*
# and Meta WA_* vars in the env group and register the webhook in Meta at
# /api/v1/whatsapp/webhook.
#
# Shared config lives in the `extraaedge-shared` env group. Secrets are marked
# sync:false so Render prompts you and never stores them in git. See
# DEPLOY-render.md.

envVarGroups:
  - name: extraaedge-shared
    envVars:
      # --- core secrets (fill in Render; never in git) ---
      - key: JWT_SECRET
        sync: false
      - key: TENANT_SECRET_ENCRYPTION_KEY
        sync: false
      - key: SYSTEM_DB_HOST
        sync: false
      - key: SYSTEM_DB_PORT
        value: "5432"
      - key: SYSTEM_DB_NAME
        sync: false
      - key: SYSTEM_DB_USER
        sync: false
      - key: SYSTEM_DB_PASSWORD
        sync: false
      - key: SYSTEM_DB_SSL
        value: "true"
      - key: TENANT_DB_HOST
        sync: false
      - key: TENANT_DB_PORT
        value: "5432"
      - key: TENANT_DB_SUPERUSER
        sync: false
      - key: TENANT_DB_SUPERUSER_PASSWORD
        sync: false
      - key: TENANT_DB_SSL
        value: "true"
      # Connection-budget guard: LRU_MAX × POOL_MAX must stay under the
      # Postgres max_connections (~100). 10 × 4 = 40, with headroom for
      # workers + admin. Raising either risks pool-exhaustion outages.
      - key: TENANT_POOL_LRU_MAX
        value: "10"
      - key: TENANT_DB_POOL_MAX
        value: "4"
      - key: TENANT_DB_IDLE_TXN_TIMEOUT_MS
        value: "30000"
      - key: GCS_PROJECT_ID
        sync: false
      - key: GCS_BUCKET
        sync: false
      # --- provider keys (still required by env.js boot validation) ---
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        sync: false
      - key: BREVO_WEBHOOK_SECRET
        sync: false
      - key: MESSAGECENTRAL_CUSTOMER_ID
        sync: false
      - key: MESSAGECENTRAL_AUTH_TOKEN
        sync: false
      - key: MESSAGECENTRAL_SENDER_ID
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: EXOTEL_ACCOUNT_SID
        sync: false
      - key: EXOTEL_API_KEY
        sync: false
      - key: EXOTEL_API_TOKEN
        sync: false
      - key: EXOTEL_CALLER_ID
        sync: false
      - key: EXOTEL_WEBHOOK_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: QUEUE_DRIVER
        value: bullmq

services:
  # ---- API + socket.io (Node runtime; no browser needed) ----
  - type: web
    name: extraaedge-api
    runtime: node
    plan: standard
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - fromGroup: extraaedge-shared
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      # WhatsApp inbox uses WABridge (send) + a Meta Cloud API webhook (receive).
      # No separate gateway service. Set WABRIDGE_* and the Meta WA_* vars
      # (WA_PHONE_NUMBER_ID, WA_ACCESS_TOKEN, WA_WEBHOOK_VERIFY_TOKEN) in the env
      # group. Register the webhook in Meta at:
      #   https://<this-service>/api/v1/whatsapp/webhook
